# Filament Change ######################

[gcode_macro M600]
gcode:
    PAUSE
    UNLOAD_FILAMENT

[gcode_macro UNLOAD_FILAMENT]
default_parameter_L: 600
gcode:
    SAVE_GCODE_STATE NAME=UNLOAD_STATE
    {% if printer.extruder.temperature <= 190 %}
        M104 S190                     # set hotend temperature
        M109 S190                     # wait for hotend temperature
    {% endif %}
    G91                                  # relative positioning
    G1 E5 F250                           # extrude a little
    G1 E-50 F1000                        # retract filament
    G1 E-{L} F1200                       # retract a lot more
    RESTORE_GCODE_STATE name=UNLOAD_STATE

[gcode_macro LOAD_FILAMENT]
default_parameter_L: 600
gcode:
    SAVE_GCODE_STATE NAME=LOAD_STATE
    {% if printer.extruder.temperature <= 190 %}
        M104 S190                     # set hotend temperature
        M109 S190                     # wait for hotend temperature
    {% endif %}
    G91                                  # relative positioning
    G1 E{L} F1200                        # extrude fast
    G4 P900                              # dwell
    G1 E50 F250                          # extrude slow
    RESTORE_GCODE_STATE name=LOAD_STATE

# [gcode_macro PURGE]
# gcode:
#     SAVE_GCODE_STATE NAME=PURGE_STATE
#     G91                                  # relative positioning
#     G1 E50 F250                          # purge
#     RESTORE_GCODE_STATE name=PURGE_STATE

# Bed Levelling ########################

[gcode_macro G29] # Bed Levelling (Automatic)
gcode:
    G28                                  # home
    BED_MESH_CALIBRATE
    #BED_MESH_PROFILE SAVE=FBG5
    G0 X10 Y10
    SAVE_CONFIG

[gcode_macro HOT_BED_MESH_CALIBRATE] # Bed Levelling (Automatic) with heated bed
default_parameter_BED_TEMP: 50
gcode:
    M140 S{BED_TEMP}                     # set bed temperature
    M190 S{BED_TEMP}                     # wait for bed temperature
    G29                                  # level bed

[gcode_macro LOAD_BED_MESH]
gcode:
    SAVE_GCODE_STATE NAME=LOAD_BED_MESH_STATE
    BED_MESH_PROFILE LOAD=FBG
    RESTORE_GCODE_STATE NAME=LOAD_BED_MESH_STATE

# Probe Z-offset Calibation ############

[gcode_macro PROBE_CALIBRATE]
rename_existing: BASE_PROBE_CALIBRATE
#default_parameter_X: 128
#default_parameter_Y: 105
gcode:
    G28                                  # home
    #G1 X{ printer.stepper_x.position_max / 2 } Y{ printer.stepper_y.position_max / 2 }
    BASE_PROBE_CALIBRATE

# Testing Area #########################

[gcode_macro PRIME_TEST]
### REQUIRES TESTING - NESTED VARIABLES
gcode: 
    SAVE_GCODE_STATE NAME=PRIME_STATE
    G92 E0                              # reset extruder
    G1 Z2 F240                          # move Z Axis up
    # SET_GCODE_VARIABLE MACRO=PRIME_LINE VARIABLE=e_speed VALUE={e_speed}
    # PRIME_LINE
    # SET_GCODE_VARIABLE MACRO=PRIME_BLOB VARIABLE=e_speed VALUE={e_speed}
    # PRIME_BLOB
    RESTORE_GCODE_STATE NAME=PRIME_STATE

[gcode_macro PRIME_LINE_TEST]
### REQUIRES TESTING - NESTED VARIABLES
default_parameter_Y: 10
variable_e_speed = 1500 # SET_GCODE_VARIABLE MACRO=PRIME_LINE VARIABLE=e_speed VALUE=1500; 600 for TPU
gcode: 
    G1 Y{Y} Z0.28 F3000                 # move to start position
    G91                                 # relative positioning
    G1 Y180 F{e_speed} E15              # draw the line
    G1 X.3 F5000                        # move to side a little
    G1 Y-180 F{e_speed} E15             # draw the line

[gcode_macro PRIME_BLOB]
variable_e_speed = 1500 # SET_GCODE_VARIABLE MACRO=PRIME_BLOB VARIABLE=e_speed VALUE=1500; 600 for TPU
default_parameter_E: 20
gcode: 
    G1 E{E} F{e_speed}                  # extrude blob
    G1 Y10 F3000                        # wipe

[gcode_macro clean_nozzle]
gcode:
  SAVE_GCODE_STATE NAME=clean_nozzle_state
  G90
  G0 Z15 F300
  {% for wipe in range(8) %}
    {% for coordinate in [(275,4),(235,4)] %}
      G0 X{coordinate[0]} Y{coordinate[1] + 0.25 * wipe} Z9.7 F12000
    {% endfor %}
  {% endfor %}
  RESTORE_GCODE_STATE NAME=clean_nozzle_state

