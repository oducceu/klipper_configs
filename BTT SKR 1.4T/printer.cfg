# https://github.com/KevinOConnor/klipper/blob/master/docs/Command_Templates.md

# BTT SKR 1.4T ########################
#
########################################
# X, Y, Z
########################################

[stepper_x]
step_pin: P2.2
dir_pin: !P2.6
enable_pin: !P2.1
step_distance: .0125 # 16 microsteps  80 steps/mm 1.8° stepper
# endstop_pin: !P1.29 # check Sensorless Homing #P1.28 for X-max
# position_min: 0 # check Sensorless Homing
position_endstop: 0
position_max: 250
homing_speed: 50
## Sensorless Homing
endstop_pin: tmc2209_stepper_x:virtual_endstop
homing_retract_dist: 0

[tmc2209 stepper_x]
uart_pin: P1.10
microsteps: 16
interpolate: true
run_current: 0.800
hold_current: 0.500
stealthchop_threshold: 250
## Sensorless Homing
diag_pin: P1.29
driver_SGTHRS: 80

[stepper_y]
step_pin: P0.19
dir_pin: !P0.20
enable_pin: !P2.8
step_distance: .0125 # 16 microsteps  80 steps/mm 1.8° stepper
# endstop_pin: !P1.28 # check Sensorless Homing # P1.27#P1.26 for Y-max
# position_min: 0 # check Sensorless Homing
position_endstop: 0
position_max: 205
homing_speed: 50
## Sensorless Homing
endstop_pin: tmc2209_stepper_y:virtual_endstop
homing_retract_dist: 0

[tmc2209 stepper_y]
uart_pin: P1.9
microsteps: 16
interpolate: true
run_current: 0.800
hold_current: 0.500
stealthchop_threshold: 250
## Sensorless Homing
diag_pin: P1.28
driver_SGTHRS: 80

[stepper_z]
step_pin: P0.22
dir_pin: !P2.11
enable_pin: !P0.21
step_distance: .0025 # 16 microsteps 400 steps/mm
# step_distance: .00244 # 16 microsteps 410 steps/mm
# endstop_pin: !P1.28 # P1.24 for Z-max
endstop_pin: probe:z_virtual_endstop
position_min: -3 # < 0 for probe calibration
position_max: 200
homing_speed: 20

[tmc2209 stepper_z]
uart_pin: P1.8
microsteps: 16
interpolate: true
run_current: 0.800
hold_current: 0.500
stealthchop_threshold: 30

########################################
# E0, E1, HB
########################################

[extruder]
step_pin: P2.13
dir_pin: P0.11
enable_pin: !P2.12
step_distance: 0.002409  # (BMG recommended value) - 415,11 steps
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: P2.7
sensor_type: ATC Semitec 104GT-2 # Triangle E3Dv6 # EPCOS 100K B57560G104F # Stock FBG
sensor_pin: P0.24
control: pid
pid_Kp: 24.050
pid_Ki: 1.513
pid_Kd: 95.598
min_temp: 0
max_temp: 270
max_extrude_only_distance: 50 # 50 direct; 600 bowden
###   PRESSURE ADVANCE CONFIG    ###
pressure_advance: 0.125
# Filament specific g-code (works in (prusa-|super-)slicer)
# SET_PRESSURE_ADVANCE [EXTRUDER=<config_name>] [ADVANCE=<pressure_advance>] [SMOOTH_TIME=<pressure_advance_smooth_time>]
## PLA:
## PLA+
# pressure_advance: 0.000 # eSUN PLA+ Purple
## PETG
# pressure_advance_smooth_time: 0.100
# pressure_advance: 0.000 # eSUN PETG White

[tmc2209 extruder]
uart_pin: P1.4
microsteps: 16
interpolate: False
run_current: 0.800
hold_current: 0.500
stealthchop_threshold: 50

#[extruder1]
#step_pin: P1.15
#dir_pin: P1.14
#enable_pin: !P1.16
#heater_pin: P2.4
#sensor_pin: P0.23
##uart_pin: P1.1

[heater_bed]
heater_pin: P2.5
sensor_type: EPCOS 100K B57560G104F
sensor_pin: P0.25
control: pid
pid_Kp: 57.591
pid_Ki: 1.634
pid_Kd: 507.525
min_temp: 0
max_temp: 130

[verify_heater heater_bed]
max_error: 150

########################################
# Fans
########################################

[fan]
pin: P2.3

[heater_fan heater_fan]
pin: P2.4 # extruder1 heater_pin
# heater: extruder
heater_temp: 60.0   # fan is on if t℃ > this
# fan_speed: 1.0 # from 0.0 to 1.0

########################################
# Printer
########################################

[mcu]
serial: /dev/serial/by-id/usb-Klipper_lpc1769_0250001322813AAF7F286A5CC02000F5-if00
baud: 250000
restart_method: command

[printer]
kinematics: cartesian
max_velocity: 500
max_accel: 3000
# max_accel_to_decel: 3000
# max_accel: 7000 # Ringing frequency test
# max_accel_to_decel: 7000 # Ringing frequency test
max_z_velocity: 20
max_z_accel: 150
square_corner_velocity: 5.0

########################################
# Bed leveling
########################################

[safe_z_home]
home_xy_position: 127.5,105
z_hop: 15
#move_to_previous: true

[bed_mesh]
speed: 150
mesh_min: 40,10
mesh_max: 235,170
probe_count: 4,4
algorithm: bicubic

[bltouch]
sensor_pin: P1.27
control_pin: P2.0
set_output_mode: 5V
x_offset: +37.197
y_offset: -20.358
#z_offset: 2.3

########################################
# Optional G-Code features
########################################

[force_move]
enable_force_move: true # Support manually moving stepper motors

[pause_resume]

[firmware_retraction]
retract_length: 0.5
retract_speed: 60
unretract_extra_length: 0
unretract_speed: 60

[gcode_arcs]

[respond]

########################################
# Resonance compensation
########################################

[input_shaper]
shaper_freq_x: 43.77
shaper_freq_y: 43.73
shaper_type: mzv

########################################
# GCode Macros
########################################

# Start Print and End Print ############

[gcode_macro START_PRINT]
gcode:
    CLEAR_PAUSE
    G90                                 # absolute positioning
    M82                                 # absolute extruder mode
    G28                                 # home
    # NEW_BED_MESH
    BED_MESH_PROFILE LOAD=default
    PRIME_LINE
    # PRIME_BLOB
    G92 E0                              # reset extruder

[gcode_macro END_PRINT]
gcode:
    TURN_OFF_HEATERS
    M106 S0                             # turn off fan
    G10                                 # firmware retract
    G91                                 # relative positioning
    G1 X-2 Y-2 F300                     # move nozzle away from print
    {% if printer.toolhead.position.z <= 190 %}
        G1 Z10 F3000                    # raise nozzle
        G90                             # absolute positioning
    {% else %}
        G90                             # absolute positioning
        G1 Z200 F3000                   # raise nozzle
    {% endif %}
    G1 X0 Y200 F3000                    # present print
    M84                                 # turn off all motors

# Prime the nozzle #####################

[gcode_macro PRIME_LINE]
variable_e_speed = 1500
default_parameter_X: 0
default_parameter_Y: 10
gcode: 
    SAVE_GCODE_STATE NAME=PRIME_LINE_STATE
    G92 E0                              # reset extruder
    G1 Z2 F240                          # move Z Axis up
    G1 X{X} Y{Y} Z0.28 F3000            # move to start position
    G91                                 # relative positioning
    G1 Y180 F1500 E15                   # draw the first line
    G1 X.3 F5000                        # move to side a little
    G1 Y-180 F1500 E15                  # draw the first line
    RESTORE_GCODE_STATE NAME=PRIME_LINE_STATE
    G92 E0                              # reset extruder

# Pause Print and Resume Print #########

[gcode_macro PAUSE]
rename_existing: BASE_PAUSE
gcode:
    SAVE_GCODE_STATE NAME=PAUSE_STATE
    BASE_PAUSE
    PARK

[gcode_macro PARK]
default_parameter_X: 0                  # edit to your park position
default_parameter_Y: 0                  # edit to your park position
default_parameter_Z: 10                 # edit to your park position
gcode:
    SAVE_GCODE_STATE NAME=PARK_STATE
    G10                                 # firmware retract
    G91                                 # relative positioning
    G1 Z{Z} F3000                       # raise nozzle
    G90                                 # absolute positioning
    G1 X{X} Y{Y} F3000                  # park the head
    RESTORE_GCODE_STATE name=PARK_STATE

[gcode_macro RESUME]
rename_existing: BASE_RESUME
gcode:
    G11                                 # firmware unretract
    RESTORE_GCODE_STATE NAME=PAUSE_STATE MOVE=1
    BASE_RESUME

# [gcode_macro CANCEL_PRINT]
