# Filament Change ######################

[gcode_macro M600]
gcode:
    SAVE_GCODE_STATE NAME=filament_change
    PAUSE
    SET_IDLE_TIMEOUT TIMEOUT=7200
    UNLOAD_FILAMENT
    COUNTDOWN TIME=30 MSG="Switch"
    LOAD_FILAMENT
    RESUME
    RESTORE_GCODE_STATE NAME=filament_change

[gcode_macro UNLOAD_FILAMENT]
default_parameter_L: 50
gcode:
    SAVE_GCODE_STATE NAME=UNLOAD_STATE
    LOW_TEMP_CHECK
    M83                                 # relative extrusion
    G1 E0.5  F1200                      # clean nozzle
    G1 E-0.5 F1200
    G1 E1.0  F1200
    G1 E-1.0 F1200
    G1 E1.5  F1200
    G1 E-1.5 F1200
    G1 E2.0  F1200
    G1 E-{L} F3000                      # retract a lot
    RESTORE_GCODE_STATE name=UNLOAD_STATE

[gcode_macro LOAD_FILAMENT]
default_parameter_L: 50
gcode:
    SAVE_GCODE_STATE NAME=LOAD_STATE
    LOW_TEMP_CHECK
    M83                                 # relative extrusion
    G1 E{L} F1200                       # extrude fast
    G4 P1000                            # dwell 1 second
    G1 E50 F250                         # extrude slow
    RESTORE_GCODE_STATE name=LOAD_STATE

[gcode_macro LOW_TEMP_CHECK]
default_parameter_T: 200
gcode:
    {% if printer.extruder.target != 0 %} # if there is a setpoint for extruder
        {% if printer.extruder.temperature < printer.extruder.target %} # if not reached, heat
            M118 Heating from {printer.extruder.temperature} to {printer.extruder.target}.
            M109 S{printer.extruder.target|float} 
        {% endif %}
    {% else %} # if no setpoint for extruder
        {% if printer.extruder.target < T %}  # heat to T.
            M118 No setpoint, heating to {T}.
            M109 S{T}
        {% endif %}
    {% endif %}

[gcode_macro COUNTDOWN]
default_parameter_MSG: "Time: "
default_parameter_TIME: 10
gcode: 
    # countdown 
    {% for s in range(TIME|int, 0, -1) %}
        # dwell 1 second
        G4 P1000
        # echo
        M117 {params.MSG} {s}s
        M118 {params.MSG} {s}s
    {% endfor %}

# [gcode_macro PURGE]
