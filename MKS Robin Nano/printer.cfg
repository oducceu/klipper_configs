# Move and Bed Levelling ###############

[gcode_macro HOME]
gcode:
    {% if printer.toolhead.homed_axes == "xyz" %}
        M118 Printer is already homed
    {% else %}
        G28
    {% endif %}

# Prusa Slicer Compatibility ############

[gcode_macro M204]
rename_existing: M20410
gcode:
  {action_respond_info("Ignoring M204 Command: Using max_accel from printer.cfg")}

[gcode_macro M201]
gcode:
  {action_respond_info("Ignoring M201 Command")}

[gcode_macro M203]
gcode:
  {action_respond_info("Ignoring M203 Command")}

[gcode_macro M205]
gcode:
  {action_respond_info("Ignoring M205 Command")}

# Testing Area #########################

[gcode_macro PRIME_BLOB]
variable_e_speed = 1500 # SET_GCODE_VARIABLE MACRO=PRIME_BLOB VARIABLE=e_speed VALUE=1500; 600 for TPU
default_parameter_E: 20
gcode: 
    G1 E{E} F{e_speed}                  # extrude blob
    G1 Y10 F3000                        # wipe

[gcode_macro CLEAN_NOZZLE]
gcode:
  SAVE_GCODE_STATE NAME=CLEAN_NOZZLE_STATE
  G90
  G0 Z15 F300
  {% for wipe in range(8) %}
    {% for coordinate in [(275,4),(235,4)] %}
      G0 X{coordinate[0]} Y{coordinate[1] + 0.25 * wipe} Z9.7 F12000
    {% endfor %}
  {% endfor %}
  RESTORE_GCODE_STATE NAME=CLEAN_NOZZLE_STATE

