# Printer: Flying Bear Ghost 5
# Board: MKS Robin Nano 1.1
################################################################################

########################################
# Instructions
########################################

# Documentation
# https://www.klipper3d.org/Overview.html#configuration-and-tuning-guides
# 
# Examples
# https://github.com/KevinOConnor/klipper/blob/master/config/example.cfg
# https://github.com/KevinOConnor/klipper/blob/master/config/example-extras.cfg
# https://github.com/KevinOConnor/klipper/blob/master/config/sample-macros.cfg
# https://github.com/KevinOConnor/klipper/blob/master/docs/Command_Templates.md

# MKS Robin Nano 1.1 ###################
#
# This file contains common pin mappings for MKS Robin Nano (v1.2.004)
# boards. To use this config, the firmware should be compiled for the
# STM32F103. When running "make menuconfig", enable ëxtra low-level
# configuration setup", select the 28KiB bootloader, disable ÜSB for
# communication", and select USART3 for the "Serial Port".
#
# Note that the "make flash" command does not work with MKS Robin
# boards. After running "make", run the following command:
#   ./scripts/update_mks_robin.py out/klipper.bin out/Robin_nano35.bin
# Copy the file out/Robin_nano35.bin to an SD card and then restart the
# printer with that SD card.

########################################
# X, Y, Z
########################################

[stepper_x]
step_pin: PE3
dir_pin: PE2
enable_pin: !PE4
step_distance: .0125 # 16 microsteps  80 steps/mm 1.8° stepper
endstop_pin: !PA15
position_min: -1.3
position_endstop: -1.3
position_max: 255
homing_speed: 50

[stepper_y]
step_pin: PE0
dir_pin: PB9
enable_pin: !PE1
step_distance: .0125 # 16 microsteps  80 steps/mm 1.8° stepper
endstop_pin: !PA12
position_min: -4.8
position_endstop: -4.8
position_max: 210
homing_speed: 50

[stepper_z]
step_pin: PB5
dir_pin: !PB4 # !PB4 TMC220X@FBG5 # PB4 A4988@FBG5
enable_pin: !PB8
step_distance: .0025 # 16 microsteps 400 steps/mm
endstop_pin: !PA11
position_endstop: 0.5
position_max: 200
homing_speed: 20

########################################
# E0, E1, HB
########################################

[extruder]
step_pin: PD6
dir_pin: !PD3 # !PD3 TMC220X@FBG5 # PD3 A4988@FBG5
enable_pin: !PB3
step_distance: .002445 # 16 microsteps 409 steps/mm
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PC3
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC1
control: pid
pid_Kp: 32.561
pid_Ki: 3.743
pid_Kd: 70.820
min_temp: 0
max_temp: 260
max_extrude_only_distance: 50 # 50 direct; 600 bowden
###   PRESSURE ADVANCE CONFIG    ###
pressure_advance: 0.200
# Filament specific g-code (works in (prusa-|super-)slicer)
# SET_PRESSURE_ADVANCE [EXTRUDER=<config_name>] [ADVANCE=<pressure_advance>] [SMOOTH_TIME=<pressure_advance_smooth_time>]
## PLA:
# pressure_advance: 0.200 # FBG PLA Black


#[extruder1]
#step_pin: PA6
#dir_pin: !PA1
#enable_pin: !PA3
#heater_pin: PB0
#sensor_pin: PC2
#...

[heater_bed]
heater_pin: PA0
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC0
control: pid
pid_Kp: 57.591
pid_Ki: 1.634
pid_Kd: 507.525
min_temp: 0
max_temp: 130

[verify_heater heater_bed]
max_error: 150

########################################
# Fans
########################################

[fan]
pin: PB1

[heater_fan heater_fan]
pin: PB0 # extruder1 heater_pin
# heater: extruder
heater_temp: 60.0   # fan is on if t℃ > this
# fan_speed: 1.0 # from 0.0 to 1.0

########################################
# Printer
########################################

[mcu]
serial: /dev/serial/by-id/usb-1a86_USB_Serial-if00-port0
baud: 250000
restart_method: command

[printer]
kinematics: cartesian
max_velocity: 500
max_accel: 3000
# max_accel_to_decel: 3000
# max_accel: 7000 # Ringing frequency test
# max_accel_to_decel: 7000 # Ringing frequency test
max_z_velocity: 20
max_z_accel: 150
square_corner_velocity: 5.0

########################################
# Bed leveling
########################################

########################################
# Optional G-Code features
########################################

[force_move]
enable_force_move: true # Support manually moving stepper motors

[pause_resume]

[firmware_retraction]
retract_length: 0.5
retract_speed: 30
unretract_extra_length: 0
unretract_speed: 30

[gcode_arcs]

[respond]

########################################
# Resonance compensation
########################################

[input_shaper]
shaper_freq_x: 43.442
shaper_freq_y: 46.679
shaper_type: ei

########################################
# GCode Macros
########################################

# Start Print and End Print ############

[gcode_macro START_PRINT]
variable_TEMP_BED: 50
variable_TEMP_EXTRUDER: 200
gcode:
    CLEAR_PAUSE
    G90                                 # absolute positioning
    M82                                 # absolute extruder mode
    HOME                                # home
    G92 E0                              # reset extruder
    # NEW_BED_MESH
    # LOAD_BED_MESH

    # Start bed heating and continue
    M140 S{TEMP_BED}
    {% if printer.heater_bed.temperature < params.TEMP_BED|float*0.85 %}
        M190 S{params.TEMP_BED|float*0.85} # wait till 0.85 of bed temp is reached, then continue
    {% endif %}
    M140 S{TEMP_BED} 
    M109 S{TEMP_EXTRUDER}
    M190 S{TEMP_BED}

    PRIME_LINE

[gcode_macro END_PRINT]
gcode:
    TURN_OFF_HEATERS
    M106 S0                             # turn off fan
    G10                                 # firmware retract
    #GET_POSITION
    G1 Z{ [printer.gcode_move.gcode_position.z + 20,printer.configfile.config["stepper_z"]["position_max"]|float]|min } F5000
    # UPDATE_DELAYED_GCODE ID=DELAY_GET_POSITION DURATION=4
    G91                                 # relative positioning
    G1 E-5 F3000
    G1 X-2 Y-2 F300                     # move nozzle away from print
    #{% if printer.toolhead.position.z <= 190 %}
    #    G1 Z10 F3000                    # raise nozzle
    #    G90                             # absolute positioning
    #{% else %}
    #    G90                            # absolute positioning
    #    G1 Z200 F3000                  # raise nozzle
    #{% endif %}
    G90                                 # absolute positioning
    G1 X0 Y200 F3000                    # present print
    M84                                 # turn off all motors

[delayed_gcode DELAY_GET_POSITION]
gcode:
  GET_POSITION

# Prime the nozzle #####################

[gcode_macro PRIME_LINE]
default_parameter_X: 37.5
default_parameter_Y: 0
variable_FEEDRATE: 1500 # SET_GCODE_VARIABLE MACRO=PRIME_LINE VARIABLE=FEEDRATE VALUE=500 # For TPU
variable_Z: 0.2 # SET_GCODE_VARIABLE MACRO=PRIME_LINE VARIABLE=Z VALUE=[first_layer_height] # For other nozzle Ф
variable_VOLUME: 10 # SET_GCODE_VARIABLE MACRO=PRIME_LINE VARIABLE=VOLUME VALUE=10 # For other nozzle Ф
gcode: 
    SAVE_GCODE_STATE NAME=PRIME_LINE_STATE
    G92 E0                              # reset extruder
    G1 Z2 F240                          # move Z Axis up
    G1 X{X} Y{Y} Z{Z} F3000             # move to start position
    G91                                 # relative positioning
    G1 E5 F{FEEDRATE}                   # deretract
    G1 X180 F{FEEDRATE} E{VOLUME}       # draw the first line
    G1 Y.3 F5000                        # move to side a little
    G1 X-180 F{FEEDRATE} E{VOLUME}      # draw the first line
    RESTORE_GCODE_STATE NAME=PRIME_LINE_STATE

# Pause Print and Resume Print #########

[gcode_macro PAUSE]
rename_existing: BASE_PAUSE
gcode:
    SAVE_GCODE_STATE NAME=PAUSE_STATE
    BASE_PAUSE
    PARK

[gcode_macro PARK]
default_parameter_X: 0                  # edit to your park position
default_parameter_Y: 0                  # edit to your park position
default_parameter_Z: 10                 # edit to your park position
gcode:
    SAVE_GCODE_STATE NAME=PARK_STATE
    G10                                 # firmware retract
    G91                                 # relative positioning
    G1 Z{Z} F3000                       # raise nozzle
    G90                                 # absolute positioning
    G1 X{X} Y{Y} F3000                  # park the head
    RESTORE_GCODE_STATE name=PARK_STATE

[gcode_macro RESUME]
rename_existing: BASE_RESUME
gcode:
    G11                                 # firmware unretract
    RESTORE_GCODE_STATE NAME=PAUSE_STATE MOVE=1
    BASE_RESUME

